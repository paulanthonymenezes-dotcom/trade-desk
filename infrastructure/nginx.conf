events {
    worker_connections 64;
}

http {
    upstream gateway {
        server cpgateway:5000;
    }

    # HTTPS server — handles both login and API
    server {
        listen 443 ssl;
        server_name _;

        ssl_certificate /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;

        # SSO login pages — no auth token needed (for browser login)
        location /sso/ {
            proxy_pass https://gateway/sso/;
            proxy_ssl_verify off;
            proxy_set_header Host localhost:5000;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_cookie_domain localhost $host;
            proxy_cookie_flags ~ nosecure;
        }

        # Portal endpoints needed during login
        location /v1/portal/ {
            proxy_pass https://gateway/v1/portal/;
            proxy_ssl_verify off;
            proxy_set_header Host localhost:5000;
            proxy_cookie_domain localhost $host;
            proxy_cookie_flags ~ nosecure;
        }

        # Demo app / root page
        location / {
            proxy_pass https://gateway/;
            proxy_ssl_verify off;
            proxy_set_header Host localhost:5000;
            proxy_cookie_domain localhost $host;
            proxy_cookie_flags ~ nosecure;
        }

        # API proxy with auth token (for Vercel auto-exit calls)
        location /v1/api/ {
            # Allow if auth token matches OR if request has valid session cookie
            set $auth_ok 0;
            if ($http_x_trade_auth = "842ffd3194b5ade88b90ad62008dccab4c29c7de79b97b061768ef7e6959f57c") {
                set $auth_ok 1;
            }
            if ($cookie_api) {
                set $auth_ok 1;
            }

            if ($auth_ok = 0) {
                return 401 '{"error": "unauthorized"}';
            }

            proxy_pass https://gateway/v1/api/;
            proxy_ssl_verify off;
            proxy_set_header Host localhost:5000;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_cookie_domain localhost $host;
            proxy_cookie_flags ~ nosecure;
        }

        # Health check (no auth required)
        location /health {
            proxy_pass https://gateway/v1/api/iserver/auth/status;
            proxy_ssl_verify off;
        }
    }
}
