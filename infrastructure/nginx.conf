events {
    worker_connections 64;
}

http {
    upstream ibeam {
        server ibeam:5000;
    }

    server {
        listen 443 ssl;
        server_name _;

        ssl_certificate /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;

        # Auth token check — must match TRADE_AUTH_TOKEN in Vercel env
        set $auth_ok 0;
        if ($http_x_trade_auth = "REPLACE_WITH_YOUR_SECRET_TOKEN") {
            set $auth_ok 1;
        }

        location /v1/api/ {
            if ($auth_ok = 0) {
                return 401 '{"error": "unauthorized"}';
            }

            proxy_pass https://ibeam/v1/api/;
            proxy_ssl_verify off;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Health check (no auth required)
        location /health {
            proxy_pass https://ibeam/v1/api/iserver/auth/status;
            proxy_ssl_verify off;
        }
    }
}
