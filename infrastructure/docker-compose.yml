services:
  # IBKR Client Portal Gateway — manual browser login, no IBeam automation
  cpgateway:
    image: voyz/ibeam:latest
    container_name: ibkr-gateway
    entrypoint: ["bash", "/srv/start-gateway.sh"]
    ports:
      - "5000:5000"
    volumes:
      - ./conf.yaml:/srv/inputs/conf.yaml:ro
      - ./start-gateway.sh:/srv/start-gateway.sh:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sk", "https://localhost:5000/v1/api/iserver/auth/status"]
      interval: 60s
      timeout: 10s
      retries: 3

  # Nginx reverse proxy with HTTPS + auth token
  nginx:
    image: nginx:alpine
    container_name: ibkr-proxy
    ports:
      - "443:443"
      - "8080:8080"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - cpgateway
    restart: unless-stopped
